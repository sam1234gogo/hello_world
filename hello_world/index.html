<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Hello World - 3D</title>
  <style>
    :root {
      --depth: 60px;
      --gold-light: #ffd700;
      --gold-dark:  #ff8c00;
      --side-light: #a07820;
      --side-dark:  #3a2500;
      --bg:         #0d0d1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Arial Black', Impact, sans-serif;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── 3D Scene ── */
    .scene {
      perspective: 900px;
      perspective-origin: 50% 40%;
      position: relative;
      z-index: 1;
    }

    .stage {
      transform-style: preserve-3d;
      transform: rotateX(-15deg) rotateY(0deg);
      cursor: grab;
    }

    .stage.dragging { cursor: grabbing; }

    /* ── Faces ── */
    .face {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .box {
      position: relative;
      width: 720px;
      height: 120px;
      transform-style: preserve-3d;
    }

    /* front */
    .face.front {
      transform: translateZ(calc(var(--depth) / 2));
      background: linear-gradient(180deg, #1a1200 0%, #0d0d1a 100%);
    }

    /* back */
    .face.back {
      transform: rotateY(180deg) translateZ(calc(var(--depth) / 2));
      background: linear-gradient(180deg, #1a1200 0%, #0d0d1a 100%);
    }

    /* top */
    .face.top {
      height: var(--depth);
      top: 0;
      transform: rotateX(90deg) translateZ(0px) translateY(calc(var(--depth) / -2));
      background: linear-gradient(90deg, var(--side-dark), var(--side-light), var(--side-dark));
    }

    /* bottom */
    .face.bottom {
      height: var(--depth);
      top: 0;
      transform: rotateX(-90deg) translateZ(0px) translateY(calc(120px - var(--depth) / 2));
      background: linear-gradient(90deg, var(--side-dark), var(--side-light) 40%, var(--side-dark));
    }

    /* ── Text ── */
    .label {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: 6px;
      line-height: 1;
      background: linear-gradient(180deg, #fff5c0 0%, var(--gold-light) 40%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 200, 0, 0.6));
      user-select: none;
    }

    .face.back .label {
      transform: scaleX(-1);
      background: linear-gradient(180deg, #fff5c0 0%, var(--gold-light) 40%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 200, 0, 0.6));
    }

    /* ── Reflection ── */
    .reflection-wrap {
      position: relative;
      z-index: 1;
      margin-top: 8px;
    }

    .reflection {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: 6px;
      line-height: 1;
      background: linear-gradient(180deg,
        rgba(255, 180, 0, 0.35) 0%,
        rgba(255, 140, 0, 0.0) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transform: scaleY(-1);
      display: block;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 80%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 80%);
      user-select: none;
    }

    /* ── Subtitle ── */
    .subtitle {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      color: rgba(255, 200, 80, 0.4);
      font-size: 13px;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="scene">
    <div class="stage">
      <div class="box">
        <div class="face front"><span class="label">HELLO WORLD</span></div>
        <div class="face back"><span class="label">HELLO WORLD</span></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
    </div>
  </div>

  <div class="reflection-wrap">
    <span class="reflection">HELLO WORLD</span>
  </div>

  <p class="subtitle">drag to rotate &nbsp;·&nbsp; css 3d</p>

  <script>
    // Mouse drag rotation with inertia
    const stage = document.querySelector('.stage');
    let rotX = -15, rotY = 0;
    let velX = 0,  velY = 0.4;   // initial gentle auto-spin
    let dragging = false;
    let lastX = 0, lastY = 0;
    let rafId;

    function applyTransform() {
      stage.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }

    function animate() {
      if (!dragging) {
        rotY += velY;
        rotX += velX;
        rotX = Math.max(-60, Math.min(60, rotX)); // clamp vertical
        velX *= 0.95;
        velY *= 0.98;
        applyTransform();
      }
      rafId = requestAnimationFrame(animate);
    }
    animate();

    stage.addEventListener('mousedown', e => {
      dragging = true;
      stage.classList.add('dragging');
      lastX = e.clientX;
      lastY = e.clientY;
      velX = 0; velY = 0;
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      velY = dx * 0.4;
      velX = dy * 0.4;
      rotY += velY;
      rotX += velX;
      rotX = Math.max(-60, Math.min(60, rotX));
      applyTransform();
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      stage.classList.remove('dragging');
    });

    // Touch support
    stage.addEventListener('touchstart', e => {
      dragging = true;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
      velX = 0; velY = 0;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dx = e.touches[0].clientX - lastX;
      const dy = e.touches[0].clientY - lastY;
      velY = dx * 0.4;
      velX = dy * 0.4;
      rotY += velY;
      rotX += velX;
      rotX = Math.max(-60, Math.min(60, rotX));
      applyTransform();
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', () => { dragging = false; });

    // Starfield background
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.4 + 0.2,
        speed: Math.random() * 0.00008 + 0.00002,
        opacity: Math.random() * 0.7 + 0.2,
      });
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.x -= s.speed;
        if (s.x < 0) { s.x = 1; s.y = Math.random(); }
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,220,120,${s.opacity})`;
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    drawStars();
  </script>
</body>
</html>
